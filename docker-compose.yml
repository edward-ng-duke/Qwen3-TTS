services:
  qwen-tts:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEIGHT_SOURCE: hf  # override with: docker compose build --build-arg WEIGHT_SOURCE=ms
    image: qwen3-tts:local
    container_name: qwen3-tts
    # Override at run-time to switch the loaded model:
    #   MODEL_VARIANT=customvoice  → 9 preset speakers + instruct  (default)
    #   MODEL_VARIANT=voicedesign  → text-described voice generation
    #   MODEL_VARIANT=base         → 3-second voice cloning
    environment:
      MODEL_VARIANT: ${MODEL_VARIANT:-customvoice}
      # User-system auth is auto-enabled when shared Mongo/JWT config is present.
      # Set AUTH_ENABLED=false to keep the historical open UI behavior.
      AUTH_ENABLED: ${AUTH_ENABLED:-auto}
      MONGO_ENABLED: ${MONGO_ENABLED:-false}
      MONGO_URL: ${MONGO_URL:-}
      DB_NAME: ${DB_NAME:-conference_ws}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      ES_AUTH_ENABLED: ${ES_AUTH_ENABLED:-false}
      ES_AUTH_URL: ${ES_AUTH_URL:-http://10.0.0.33:9201}
      ES_USER_INDEX: ${ES_USER_INDEX:-mygpt_user}
    ports:
      - "4967:4967"
    volumes:
      - qwen-tts-previews:/var/qwen-tts/previews
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qwen-tts-previews:
